name: weekly-summary

# Objectif : le Bilan de la semaine (R5) + le Manager, samedi matin Paris.
# Source de vérité : v3/docs/reco/spec-refonte-5-rapports.md §4 + §5.2 + CA-W1/CA-I2.
#
# EXCEPTION DÉLIBÉRÉE à la garde « jours de bourse » : les marchés sont fermés le
# samedi, mais R5 est un BILAN de performance (pas un bulletin sur prix live).
# Il ne stamp aucun prix d'émission, ne génère aucune cellule LONG/SHORT mesurable.
# → Il BYPASS `is_trading_day` et s'exécute UNIQUEMENT le samedi (weekday()==5).
#
# WORKFLOW SÉPARÉ (choix Q7 = job séparé) : pas de risque de confusion avec les
# runs quotidiens de cycle.yml (qui ont leur propre garde jour-de-bourse). Le
# Manager PROPOSE, Thomas VALIDE — `git diff v3/config/` reste vide (CA-W4).
#
# Cron UTC (pas de DST auto) : 6h UTC samedi = 8h Paris été (CEST) / 7h Paris
# hiver (CET) — le matin. L'écart d'1h en hiver est sans impact : R5 lit des
# données figées (archive hebdo + decision-log + KPI), pas un prix live à l'heure.
# REDONDANCE : 3 tentatives (:12/:27/:42) comme cycle.yml — un garde-fou anti-doublon
# (snapshot < 2h) no-op les tentatives 2 et 3 si le bilan a déjà été produit.
on:
  schedule:
    - cron: "12,27,42 6 * * 6"    # samedi 6h UTC = 8h Paris (CEST) / 7h (CET) — matin
  workflow_dispatch:
    inputs:
      force:
        description: "Forcer le bilan semaine hors samedi (échappatoire manuelle). Le VPS ne passe JAMAIS force=true."
        type: boolean
        default: false
  # Répétition manuelle sans bouton (mobile) : pousser v3/RUN-WEEKLY.txt déclenche R5.
  push:
    paths:
      - "v3/RUN-WEEKLY.txt"

permissions:
  contents: write

concurrency:
  group: weekly-summary
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Guard — samedi uniquement (bypass jour-de-bourse) + redondance ×3
        id: guard
        env:
          FORCE_INPUT: ${{ github.event.inputs.force }}
        run: |
          # ===================================================================
          # TABLE DE VÉRITÉ  (déclencheur × jour × force → run ?)
          # -------------------------------------------------------------------
          #   déclencheur          jour       force → run ?  pourquoi
          #   schedule (sam 6hUTC)  Samedi      —   → OUI*   bilan semaine (*anti-doublon ×3)
          #   schedule (sam 6hUTC)  autre jour  —   → NON    sécurité : ne tourne que le samedi
          #   dispatch (VPS)        Samedi    false → OUI    driver réel samedi
          #   dispatch (VPS)        autre jour false → NON   hors samedi, pas de bypass sans force
          #   dispatch (force)      N'importe true  → OUI    échappatoire humaine (bypass, CA-W1.c)
          #   push RUN-WEEKLY.txt   N'importe   —   → OUI    échappatoire humaine (bypass)
          #
          # CONTRASTE avec cycle.yml : ici la garde est INVERSÉE. cycle.yml coupe
          # le week-end ; weekly-summary ne tourne QUE le samedi. R5 ne touche
          # aucun prix live → le samedi est INTENTIONNEL, pas une anomalie.
          # `is_trading_day` n'est PAS appelé (bypass délibéré §5.2) — la seule
          # condition calendaire est `weekday()==5` (samedi, heure de Paris).
          # ===================================================================

          # --- 1. Forçage explicite = échappatoire humaine → run, bypass tout (CA-W1.c)
          #     a) workflow_dispatch avec input force=true   b) push RUN-WEEKLY.txt
          if [ "${FORCE_INPUT}" = "true" ] || [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Forçage explicite (force=${FORCE_INPUT:-n/a} / event=${GITHUB_EVENT_NAME}) → run R5, bypass garde samedi."
            exit 0
          fi

          # --- 2. Déclencheurs automatiques (schedule OU dispatch-VPS sans force) :
          #     garde SAMEDI STRICTE. weekday() : 6 = samedi en `date +%u`
          #     (1=lundi … 6=samedi, 7=dimanche). On exige le samedi heure Paris.
          dow=$(TZ='Europe/Paris' date +%u)
          if [ "$dow" -ne 6 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Pas samedi (jour=$dow, Europe/Paris) + déclenchement automatique (${GITHUB_EVENT_NAME}) → NO-OP (R5 ne tourne que le samedi)."
            exit 0
          fi

          # --- 3. Samedi : anti-doublon ×3 pour le SCHEDULE uniquement.
          #     Le schedule tire 3×/créneau (:12/:27/:42) → on no-op les tentatives
          #     2 et 3 si un bilan semaine a déjà été produit dans les 2h. Le VPS
          #     tire 1×/créneau (workflow_dispatch) → on le laisse toujours passer.
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Samedi + déclenchement ${GITHUB_EVENT_NAME} (VPS, 1 tir/créneau) → run R5."
            exit 0
          fi
          last=$(git log -1 --format=%ct --grep="bilan semaine" 2>/dev/null || echo 0)
          now=$(date +%s)
          if [ "${last:-0}" -gt 0 ] && [ $((now - last)) -lt 7200 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Bilan semaine il y a $(((now-last)/60)) min → tentative schedule redondante, SKIP."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Samedi + schedule, pas de bilan récent → run R5."
          fi

      - name: Setup Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: "Bilan semaine (R5 — Manager : win rate hebdo + propositions)"
        if: steps.guard.outputs.run == 'true'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_weekly.py

      - name: Commit and push bilan semaine
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          # Garde-fou CA-W4 : le Manager n'applique RIEN → v3/config/ doit rester intact.
          if ! git diff --quiet -- v3/config/; then
            echo "ERREUR CA-W4 : le bilan semaine a modifié v3/config/ — interdit (le Manager PROPOSE, n'applique jamais)."
            git diff --stat -- v3/config/
            exit 1
          fi
          git add v3/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(weekly): bilan semaine [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
