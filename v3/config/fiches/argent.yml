# Argent — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Argent"
ticker_principal: "SI=F"
famille: "métaux-précieux"
news_zone: "Global"
version: 2
seuils_reussite_pct:
  "24h": 0.8
  "7j": 2.0
  "1m": 5.0

criteres:
  - id: 1
    nom: "Taux d'intérêt réels US (10 ans)"
    source: "FRED (DFII10)"
    cle_courante: "taux_10y_us_reels_tips"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : TIPS baisse (z<-1) => LONG
    poids: 8
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "TIPS baisse (z<-1)"
    effet_short: "TIPS monte (z>+1)"

  - id: 2
    nom: "Mouvement de l'or (5 jours)"
    source: "Twelve Data (calculé)"
    cle_courante: "mouvement_or_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 7
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Or >+2% 5j"
    effet_short: "Or <-2% 5j"

  - id: 3
    nom: "Ratio or / argent"
    source: "Twelve Data (calculé)"
    cle_courante: "ratio_gold_silver"
    normalisation: "lineaire"
    centre: 75.0
    echelle: 12.0                # >85 / <60 autour de 75 → demi-span ~12 ; à calibrer
    cap: 1.0
    signe: -1                    # inversé : ratio>85 (argent sous-éval) => LONG
    poids: 7                      # absorbe alpha_argent_vs_or_5j (id=4, poids 5) — dedup audit Cowork 10/06 : redondants sur la valeur relative argent/or (ratio↓ ⇔ alpha 5j↑), même base or comme référence. Poids avant 7 → après 7 (= max(7,5)). Donnée secondaire (momentum relatif 5j) abandonnée car le schéma fiche ne supporte pas de source fallback → ratio absolu primaire seul.
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Ratio>85 (argent sous-éval)"
    effet_short: "Ratio<60 (cher)"

  - id: 5
    nom: "Activité industrielle Chine (indice PMI)"
    source: "Caixin (mensuel)"
    cle_courante: "caixin_pmi_manuf"
    normalisation: "lineaire"
    centre: 50.0
    echelle: 1.0                 # >51 / <49 autour de 50 → demi-span ~1 ; à calibrer
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "PMI>51"
    effet_short: "PMI<49"

  - id: 6
    nom: "Positionnement des gros spéculateurs (argent)"
    source: "CFTC (vendredi)"
    cle_courante: "cftc_cot_silver"
    normalisation: "zscore"
    zscore_window: 252
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : nets SHORT extreme => LONG (squeeze)
    poids: 5
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Nets SHORT extreme"
    effet_short: "Nets LONG extreme"

  - id: 7
    nom: "Stocks d'argent physique (marchés US)"
    source: "COMEX"
    cle_courante: "inventaires_comex_silver"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : baisse (z<-1) => LONG
    poids: 4
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "Baisse (z<-1)"
    effet_short: "Hausse (z>+1)"

  - id: 8
    nom: "Flux vers les fonds argent (5 jours)"
    source: "Twelve Data / fournisseur flux"
    cle_courante: "flux_etf_slv_pslv_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Entrées >+1σ"
    effet_short: "Sorties <-1σ"

  - id: 9
    nom: "Demande solaire et grèves minières"
    source: "events-log + rapports industrie"
    cle_courante: "demande_pv_mining_strikes"
    normalisation: "composite"   # triplet composite : demande PV (haussière/baisse) combinée aux strikes Mexique/Pérou — valeur pré-résolue {-1,0,+1}
    cap: 1.0
    signe: 1
    poids: 3
    # [BOOST NEWS 24h — refonte 23/06] pertinence 24h 0.2 → 1.0 (porteur synthèse
    # news net IA argent) : une grosse news fraîche (PV/strike) doit pouvoir
    # dominer la conviction 24h. 7j/1m INCHANGÉS (la tendance structurelle reste).
    pertinence: { "24h": 1.0, "7j": 0.5, "1m": 1.0 }
    effet_long: "Demande PV haussière OU strike Mexique/Pérou"
    effet_short: "Demande PV baisse OU stocks normalisés"

  # Critère tendance-prix v3 — correctif famille trend-following (audit 10/06,
  # momentum-prix-sweep §5.7). cle=momentum_prix_20j_argent, source=Twelve Data XAG/USD
  # (SI=F est l'identifiant interne ticker_principal ; Twelve interroge XAG/USD natif),
  # poids initial 7 ramené à 6 (A3 prove-first, concertation 10/06), motif : la fiche n'avait aucun critère de tendance-prix PROPRE
  # (mouvement_or_5j = prix de l'or, ratio_gold_silver = relatif) → incohérent avec
  # la thèse trend-following. Capte les mouvements idiosyncratiques de l'argent.
  # Signe +1 = on SUIT la tendance. Calculé par la branche dédiée
  # `momentum_prix_20j_` du dispatcher (A1, 10/06) : VRAIE variation 20j puis
  # z-score de la série de rendements — plus le z-score du niveau (laggard).
  # Pertinences = défaut famille {24h:0.6, 7j:1.0, 1m:0.8} (brief 10/06).
  - id: 11
    nom: "Tendance de l'argent (20 jours)"
    source: "Twelve Data (XAG/USD)"
    cle_courante: "momentum_prix_20j_argent"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 7→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Argent en tendance haussière (z>+1)"
    effet_short: "Argent en tendance baissière (z<-1)"

  - id: 12
    nom: "Tendance de l'argent (7 jours)"
    source: "Twelve Data (XAG/USD)"
    cle_courante: "momentum_prix_7j_argent"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 7→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Argent en tendance haussière (z>+1)"
    effet_short: "Argent en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 10
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "FOMC/CPI US <24h OU NFP vendredi OU Silver Institute report <14j"
