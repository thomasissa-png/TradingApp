# Bibliothèque « driver → raison principale » (Synthèse des décisions)
# ---------------------------------------------------------------------------
# Source de vérité ÉDITABLE À LA MAIN des phrases de la colonne « raison
# principale ». Transcrit la PARTIE 1 de l'audit
# `/tmp/audit-marche-raisons.md` (3 experts réconciliés).
#
# Utilisation (scoring_analyste._raison_cellule) :
#   - clé = `cle_courante` du critère dominant DANS LE SENS de la conclusion
#           nette de la cellule (jamais le |effet| brut à contre-sens — cf. audit
#           règle d'or, cas S&P 7j).
#   - phrase_long  → citée quand la contribution du driver pousse LONG (effet > 0).
#   - phrase_short → citée quand la contribution pousse SHORT (effet < 0).
#   - phrase_neutre (optionnelle) → citée quand la convention de signe est
#           DOUTEUSE (ex. meteo_cacao) : on n'assène pas de direction.
#
# Conventions :
#   - Les phrases décrivent l'EFFET observé (le signe d'Effet intègre déjà le
#     `sens` normal/inversé du critère). On branche sur le SIGNE de la
#     contribution, pas sur la valeur brute.
#   - Phrases COURTES, scannables, françaises, grounded (zéro narration macro
#     hors-données). UTF-8 natif.
#   - Matching : exact sur `cle_courante`, sinon par PRÉFIXE (pour les clés à
#     suffixe d'actif type `momentum_prix_20j_petrole`). Voir `prefixes` ci-bas.
#   - JAMAIS d'entrée pour un gate (⚑ FOMC hors-score) — non cité par construction.

drivers:
  taux_10y_us_reels_tips:
    phrase_long: "taux réels US bas — le portage des sans-rendement redevient supportable"
    phrase_short: "taux réels US élevés — l'or/les sans-rendement coûtent à porter"

  variation_taux_10y_5j:
