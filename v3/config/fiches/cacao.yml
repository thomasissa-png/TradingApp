# Cacao — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Cacao"
ticker_principal: "CC=F"
famille: "agri-softs"
news_zone: "CI + GH"
version: 2
seuils_reussite_pct:
  "24h": 1.0   # resserré 1.5→1.0 (audit 01/06 : vol journalière réelle ~1-2%, 1.5 jetait trop de mesures)
  "7j": 4.0
  "1m": 10.0

criteres:
  - id: 1
    nom: "Météo Côte d'Ivoire + Ghana (pluies, 30 jours)"
    source: "NOAA / météo"
    cle_courante: "meteo_ci_ghana_precip_30j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 11
    pertinence: { "24h": 0.3, "7j": 0.9, "1m": 0.7 }
    effet_long: "Sécheresse harmattan OU pluies excessives"
    effet_short: "Pluies normales"

  - id: 2
    nom: "Arrivées de cacao dans les ports ivoiriens (20 jours)"
    source: "ports CI"
    cle_courante: "arrivees_port_abidjan_sanpedro_20j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : arrivées baissent (z<-1) => LONG
    poids: 9
    pertinence: { "24h": 0.4, "7j": 1.0, "1m": 0.9 }
    effet_long: "Arrivées baissent (z<-1)"
    effet_short: "Arrivées montent (z>+1)"

  - id: 3
    nom: "Positionnement spéculatif + options cacao (ICE)"
    source: "ICE + CFTC"
    cle_courante: "hf_positioning_flux_options"
    normalisation: "composite"   # composite zscore put/call OI + zscore COT, signe INVERSÉ — valeur pré-normalisée fournie
    cap: 1.0
    signe: -1                    # inversé : OI puts>>calls + COT nets SHORT => LONG
    poids: 5                      # 7→5 : correctif famille trend-following (audit 10/06, cacao-case-study §4) — le contrarian COT sur-pondéré verrouillait LONG en marché baissier ; rééquilibré par le momentum-prix (id=11). Historique : absorbait cftc_cot_cocoa (dedup Cowork 10/06, max(7,6)=7), désormais réduit à 5.
    pertinence: { "24h": 0.3, "7j": 0.8, "1m": 1.0 }
    effet_long: "OI puts>>calls + COT nets SHORT"
    effet_short: "OI calls>>puts + COT nets LONG"

  - id: 5
    nom: "Volume de broyage de cacao (demande trimestrielle)"
    source: "associations (ECA/NCA/CAA)"
    cle_courante: "grindings_q"
    normalisation: "zscore"
    zscore_window: 12            # trimestres publiés
    zscore_div: 2
    cap: 1.0
    signe: 1                     # direct
    poids: 5
    pertinence: { "24h": 0.1, "7j": 0.3, "1m": 1.0 }
    effet_long: "> consensus"
    effet_short: "< consensus"

  - id: 6
    nom: "Réglementation UE anti-déforestation (impact supply)"
    source: "events-log (phase EUDR)"
    cle_courante: "eudr"
    normalisation: "triplet"     # +1 échéance proche tension supply / 0 / -1 implémentation sans rupture
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 0.9 }
    effet_long: "Échéance proche, tension supply"
    effet_short: "Implémentation sans rupture"

  - id: 7
    nom: "Écart de prix cacao New York − Londres"
    source: "Twelve Data (calculé)"
    cle_courante: "spread_ny_london"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.5, "7j": 0.9, "1m": 0.6 }
    effet_long: "S'élargit (squeeze NY)"
    effet_short: "Se resserre"

  # NOM CORRIGÉ 16/06 (chantier interprétation, Thomas) : ce slot est rempli
  # par la SYNTHÈSE NET DeepSeek du corpus cacao (source_track=ia_synthese), PAS
  # par un détecteur de maladie isolé — le triggers_classifier applique la
  # direction NET de l'actif à tout critère IA-routé (cf. CRITERION_SCOPE
  # ("cacao","maladies_cabosses_cacao") + ligne 1369 triggers_classifier).
  # L'ancien libellé « Maladies des cabosses → biais baissier » était un NON-SENS
  # métier (une maladie ampute la récolte = OFFRE↓ = HAUSSIER ; jamais baissier).
  # Le contenu réel = direction net du corpus (demande+offre confondues). Renommé
  # pour que le libellé n'implique JAMAIS un sens opposé à son contenu.
  # cle_courante INCHANGÉE (L023 : agrégation/mesure stables) ; signe/poids INCHANGÉS
  # (zéro modif silencieuse). Le vrai signal d'offre prospective arrive en SHADOW
  # via shadow_choc_offre (cf. chantier ③) — séparé de cette synthèse net.
  - id: 8
    nom: "Synthèse news cacao (net, IA)"
    source: "events-log"
    cle_courante: "maladies_cabosses"
    normalisation: "triplet"     # +1 net haussier / 0 / -1 net baissier (DeepSeek)
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.2, "7j": 0.5, "1m": 0.9 }
    effet_long: "Corpus news net haussier (offre tendue / demande forte)"
    effet_short: "Corpus news net baissier"

  - id: 9
    nom: "Taux de change franc CFA et cédi ghanéen"
    source: "Twelve Data (moy pondérée)"
    cle_courante: "usd_cfa_usd_cedi"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : monnaies fortes (z<-1) => LONG
    poids: 3
    pertinence: { "24h": 0.3, "7j": 0.6, "1m": 0.7 }
    effet_long: "Monnaies fortes (z<-1)"
    effet_short: "Monnaies faibles"

  # Critère tendance-prix v3 — correctif famille trend-following (audit 10/06,
  # momentum-prix-sweep §5.1 + cacao-case-study §4). cle=momentum_prix_20j_cacao,
  # source=yfinance via CC=F (Twelve ne sert PAS ce future : COCOA=404, ETF au
  # mauvais niveau écartés — zéro invention ; CC=F reste l'identifiant interne
  # ticker_principal), poids initial 9 ramené à 6 (A3 prove-first, concertation 10/06), motif : 8/12 fiches sans tendance-prix propre
  # → incohérent avec la thèse trend-following. Signe +1 = on SUIT la tendance
  # (momentum positif → LONG). Calculé par la branche dédiée
  # `momentum_prix_20j_` du dispatcher (A1, 10/06) : VRAIE variation 20j puis
  # z-score de la série de rendements — plus le z-score du niveau (laggard).
  - id: 11
    nom: "Tendance du cacao (20 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_20j_cacao"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de la distribution de référence (cohérent sox_trend_5j/dxy_trend_20j) ; le "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 9→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3). Jamais le plus gros poids de la fiche tant que non prouvé en shadow.
    pertinence: { "24h": 0.8, "7j": 1.0, "1m": 0.8 }
    effet_long: "Cacao en tendance haussière (z>+1)"
    effet_short: "Cacao en tendance baissière (z<-1)"

  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 10
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "Harmattan actif (déc-mars) OU ICCO <48h OU grindings <7j OU EUDR échéance <30j"
