name: bulletin-quotidien

# Cron UTC (GitHub Actions ne gère que l'UTC, pas le DST français).
# 05h00 UTC = 07h00 Paris en été (CEST) / 06h00 Paris en hiver (CET).
# Objectif : bulletin PRÊT pour 7h Paris toute l'année (un peu en avance l'hiver, ce qui convient
# puisqu'on lit un fichier commité). Dérive DST ±1h inévitable avec un cron UTC unique.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bulletin
  cancel-in-progress: false

jobs:
  build-bulletin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: Run bulletin
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
          LOG_LEVEL: INFO
        working-directory: ${{ github.workspace }}
        run: python v3/scripts/run_bulletin.py

      - name: Commit and push bulletin
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          git add v3/data/
          if git diff --cached --quiet; then
            echo "No bulletin changes to commit."
            exit 0
          fi
          git commit -m "chore(bulletin): daily bulletin update [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
