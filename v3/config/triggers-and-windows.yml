# triggers-and-windows.yml
# Codification des triplets binaires et des fenêtres d'activation
# Lu par : ingestion (pour classer les events) + scoring_analyste (contributions triplet/gate)
# Source de vérité pour les listes de mots-clés et fenêtres temporelles
# Version : 1 — Date : 2026-05-27 (importé du vault Bourse/Actifs/)

# ============================================================
# RÈGLES GÉNÉRALES
# ============================================================
# - Listes de mots-clés **fermées** : event qui ne match rien → valeur_triplet = 0
# - Mots-clés **FR + EN** (sources mixtes)
# - Recherche **case-insensitive** + word-boundary (pas de match partiel sub-string)
# - Fenêtres d'activation en **CET** par défaut
# - Hors fenêtre : poids effectif = 0, contribution = 0 (pas n/a, vraiment 0)

cac_40:
  tension_politique_fr:
    type: triplet
    long_keywords:
      - "accord budget"
      - "vote de confiance"
      - "stabilité gouvernementale"
      - "loi de finances adoptée"
      - "Lecornu confirmé"
      - "rating relevé"
    short_keywords:
      - "motion de censure"
      - "dissolution"
      - "dégradation rating"
      - "rating dégradé"
      - "downgrade"
      - "shutdown"
      - "blocage budget"
      - "rejet loi de finances"
      - "démission gouvernement"
      - "crise politique"
    horizon_lookback_jours: 7

