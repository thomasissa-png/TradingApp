name: probe-data

# Sonde de couverture données (verify-first) — à lancer À LA MAIN avec la clé
# Twelve réelle (forfait Grow). Mesure ce que Twelve sert vraiment par actif :
# fraîcheur journalière, intraday 1h dispo ?, futures ES=F/NQ=F et indices cash
# directs résolvent-ils ? Lecture seule, aucun commit. Résultat = logs du run.
#
# GitHub → Actions → "probe-data" → "Run workflow".

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: Run probe
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python v3/scripts/probe_data_coverage.py
