# CAC 40 — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "CAC 40"
ticker_principal: "^FCHI"
famille: "indices"
news_zone: "EU-FR"
version: 2
seuils_reussite_pct:
  "24h": 0.5
  "7j": 1.2
  "1m": 3.0

criteres:
  - id: 1
    nom: "Régime de volatilité Europe (V2X)"
    source: "Twelve Data"
    cle_courante: "v2x_regime"
    normalisation: "mapping_non_monotone"   # non-monotone : +1 au centre, -1 aux extrêmes ; échelle à calibrer
    centre_optimal: 16
    cap: 1.0
    signe: 1
    poids: 8
    pertinence: { "24h": 0.8, "7j": 0.5, "1m": 0.2 }
    effet_long: "V2X=16 (calme sain)"
    effet_short: "V2X>30 OU <11"

  - id: 2
    nom: "Écart de taux France − Allemagne (10 ans)"
    source: "Twelve Data (calculé)"
    cle_courante: "spread_oat_bund_10y"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : resserrement (z<-1) => LONG
    poids: 10
    pertinence: { "24h": 0.4, "7j": 0.9, "1m": 1.0 }
    effet_long: "Spread resserre vs 60j (z<-1)"
    effet_short: "Spread élargit (z>+1)"

  - id: 3
    nom: "Sur-performance du CAC face au S&P 500 (5 jours)"
    source: "Twelve Data (calculé)"
    cle_courante: "alpha_cac_vs_sp_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 6
    pertinence: { "24h": 0.3, "7j": 0.8, "1m": 0.6 }
    effet_long: "CAC out-perf >+1%"
    effet_short: "CAC under-perf >-1%"

  - id: 4
    nom: "Participation des valeurs CAC au-dessus de leur moyenne (non disponible)"
    # n/a ASSUMÉ : pas d'ETF CAC 40 equal-weight gratuit évident → pas de proxy
    # participation type RSP/SPY (S&P) ou QQQE/QQQ (Nasdaq). Calcul maison (40
    # titres × MA50) techniquement jouable mais asymétrique avec S&P/Nasdaq en
    # proxy ratio — non câblé. Le critère reste n/a (handler no_breadth_data),
    # absorbé par le gate de couverture S5. Voir v3/audit/sourcing-capteurs-manquants.md.
    source: "n/a (pas d'ETF CAC equal-weight gratuit)"
    cle_courante: "breadth_cac_ma50"
    normalisation: "lineaire"
    centre: 50.0
    echelle: 35.0                # conservé pour mémoire — le handler renvoie n/a
    cap: 1.0
    signe: 1
    poids: 6
    pertinence: { "24h": 0.9, "7j": 0.7, "1m": 0.4 }
    effet_long: "Breadth >65%"
    effet_short: "Breadth <30%"

  - id: 5
    nom: "Flux vers les fonds actions France (5 jours)"
    source: "Twelve Data / fournisseur flux"
    cle_courante: "flux_etf_msci_france_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.3, "7j": 1.0, "1m": 0.7 }
    effet_long: "Entrées >+1σ"
    effet_short: "Sorties <-1σ"

  - id: 6
    nom: "Stabilité politique en France"
    source: "events-log L2=France-politique"
    cle_courante: "tension_politique_fr"
    normalisation: "triplet"     # +1 accord budget/stabilité / 0 / -1 motion/dissolution/dégradation/shutdown
    cap: 1.0
    signe: 1
    poids: 3
    # [BOOST NEWS 24h — refonte 23/06] pertinence 24h 0.5 → 1.0 (porteur synthèse
    # news net IA CAC 40) : une grosse news politique fraîche doit pouvoir dominer
    # la conviction 24h. 7j/1m INCHANGÉS.
    pertinence: { "24h": 1.0, "7j": 0.8, "1m": 0.5 }
    effet_long: "Accord budget/stabilité"
    effet_short: "Motion/dissolution/dégradation rating/shutdown"

  - id: 7
    nom: "Indicateur technique CAC 40 (RSI 14 jours)"
    source: "Twelve Data (calculé)"
    cle_courante: "rsi_14j_fchi"
    normalisation: "lineaire"
    centre: 50.0
    echelle: 25.0                # RSI 30/75 autour de 50 → demi-span ~25 ; à calibrer
    cap: 1.0
    signe: -1                    # inversé : RSI=30 oversold => LONG
    poids: 2
    pertinence: { "24h": 0.8, "7j": 0.4, "1m": 0.2 }
    effet_long: "RSI=30 oversold"
    effet_short: "RSI>75"

  # Critère tendance-prix v3 — fin de la famille trend-following (audit
  # momentum-family 10/06, A8 : indices plafonnés à 4-5, RSI poids 2 CONSERVÉ).
  # cle=momentum_prix_20j_cac40, source=Twelve Data ^FCHI (cf. rsi_14j_fchi /
  # alpha_cac_vs_sp_5j). poids=4 (plafond A8) : tendance prix directe, distincte
  # de l'alpha CAC vs S&P 5j (id=3) et du RSI (id=7, conservé à 2). Signe +1 =
  # on SUIT la tendance. VRAIE variation 20j puis z-score de la série de
  # rendements (A1, dispatcher par préfixe `momentum_prix_20j_`).
  - id: 9
    nom: "Tendance du CAC 40 (20 jours)"
    source: "Twelve Data (^FCHI)"
    cle_courante: "momentum_prix_20j_cac40"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : CAC 40 en tendance haussière (z>+1) = tendance suivie => LONG
    poids: 4                     # plafond indices A8 (4-5) ; prove-first, RSI poids 2 conservé. Cf. CHANGELOG 11/06.
    pertinence: { "24h": 0.4, "7j": 0.3, "1m": 1.0 }   # 22/06 recalibrage : 20j sert le 1 mois (retard ~10j), minoritaire sur 7j
    effet_long: "CAC 40 en tendance haussière (z>+1)"
    effet_short: "CAC 40 en tendance baissière (z<-1)"

  - id: 10
    nom: "Tendance du CAC 40 (7 jours)"
    source: "Twelve Data (^FCHI)"
    cle_courante: "momentum_prix_7j_cac40"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : CAC 40 en tendance haussière (z>+1) = tendance suivie => LONG
    poids: 4                     # plafond indices A8 (4-5) ; prove-first, RSI poids 2 conservé. Cf. CHANGELOG 11/06.
    pertinence: { "24h": 0.3, "7j": 1.0, "1m": 0.2 }   # 22/06 recalibrage : tendance COURTE, domine le 7j (retard ~2-3j)
    effet_long: "CAC 40 en tendance haussière (z>+1)"
    effet_short: "CAC 40 en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 8
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "V2X>40 OU FOMC/BCE/CPI US/NFP <24h OU géopol Iran-Europe actif"
