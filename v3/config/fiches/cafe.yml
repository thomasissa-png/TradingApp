# Café (Arabica) — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Café (Arabica)"
ticker_principal: "KC=F"
famille: "agri-softs"
news_zone: "BR + VN"
version: 2
seuils_reussite_pct:
  "24h": 1.0
  "7j": 3.0
  "1m": 7.0

criteres:
  # FIX SIGNE (18/06) — même bug que le cacao. Ce critère est SYMÉTRIQUE :
  # l'intention déclarée (effet_long « Gel imminent OU sécheresse persistante »)
  # dit que les DEUX extrêmes climatiques menacent l'offre = HAUSSIER ; les pluies
  # normales/abondantes = baissier. MAIS l'ancienne impl. (`composite` qui ne câblait
  # en réalité QUE l'anomalie de précipitations via fetch_open_meteo_anomaly, puis
  # `norm = z/div` + `signe:1`) était une ligne DROITE : plus de pluie = haussier,
  # SÉCHERESSE = baissier → à CONTRE-SENS (poussait le café SHORT en sécheresse).
  # Corrigé par `normalisation: zscore_abs` (« écart à la normale dans les 2 sens »,
  # basé sur |z|, réutilise le mécanisme cacao zscore_abs_normalisee via _handle_meteo —
  # la clé est déjà dans METEO_CRITERIA). zscore_centre=0 ; signe=+1 (norm>0=haussier).
  # ⚠️ La dimension GEL (Tmin<4°C) reste NON câblée : le composite ne l'utilisait
  # déjà PAS (seule la pluie était lue) → ce fix ne la régresse pas, mais le gel
  # reste un CHANTIER DATA SÉPARÉ (cf. handoff). cle_courante/poids INCHANGÉS (L023).
  - id: 1
    nom: "Météo Brésil — écart à la normale (sécheresse OU excès, Minas Gerais)"
    source: "NOAA / météo (précipitations ; T min non câblée)"
    cle_courante: "meteo_bresil_minas_gerais"
    normalisation: "zscore_abs"   # |z| précipitations 60j : sécheresse OU excès = haussier
    zscore_window: 60
    zscore_div: 2
    zscore_centre: 0.0            # déviation jugée « normale » (en z) ; 0 = neutre au centre
    cap: 1.0
    signe: 1                      # +1 : norm>0 (écart à la normale) => HAUSSIER
    poids: 11
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 1.0 }
    effet_long: "Sécheresse persistante OU pluies excessives (écart à la normale)"
    effet_short: "Pluies normales/abondantes (proche de la climatologie)"

  - id: 2
    nom: "Stocks d'Arabica certifiés (tendance 20 jours)"
    source: "ICE"
    cle_courante: "stocks_ice_arabica_certifies_20j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : stocks baissent (z<-1) => LONG
    poids: 9
    pertinence: { "24h": 0.3, "7j": 0.9, "1m": 1.0 }
    effet_long: "Stocks baissent (z<-1)"
    effet_short: "Stocks montent (z>+1)"

  - id: 3
    nom: "Taux de change dollar / real brésilien"
    source: "Twelve Data"
    cle_courante: "usd_brl"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : USD/BRL baisse (real fort) => LONG
    poids: 6
    pertinence: { "24h": 0.4, "7j": 0.8, "1m": 0.9 }
    effet_long: "USD/BRL baisse (real fort)"
    effet_short: "USD/BRL monte (real faible)"

  - id: 4
    nom: "Positionnement des gros spéculateurs (café)"
    source: "CFTC (vendredi)"
    cle_courante: "cftc_cot_coffee"
    normalisation: "zscore"
    zscore_window: 252
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : nets SHORT extreme => LONG (squeeze)
    poids: 5
    pertinence: { "24h": 0.2, "7j": 0.7, "1m": 1.0 }
    effet_long: "Nets SHORT extreme"
    effet_short: "Nets LONG extreme"

  - id: 5
    nom: "Maladies du caféier (rouille et cabosses)"
    source: "events-log"
    cle_courante: "maladies_cabosses_rouille"
    normalisation: "triplet"     # +1 outbreak 30j / 0 / -1 aucun
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.3, "7j": 0.7, "1m": 1.0 }
    effet_long: "Outbreak 30j"
    effet_short: "Aucun"

  - id: 6
    nom: "Cycle de production brésilien (année forte / faible)"
    source: "calendrier CONAB"
    cle_courante: "cycle_bresil_biannuel"
    normalisation: "triplet"     # +1 année off (prod faible) / 0 / -1 année on (prod forte)
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.1, "7j": 0.3, "1m": 0.9 }
    effet_long: "Année « off » (prod faible)"
    effet_short: "Année « on » (prod forte)"

  - id: 7
    nom: "Écart de prix Arabica − Robusta"
    source: "Twelve Data (calculé)"
    cle_courante: "spread_arabica_robusta"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.3, "7j": 0.8, "1m": 0.7 }
    effet_long: "Se resserre (z<-1)"
    effet_short: "S'élargit (z>+1)"

  - id: 8
    nom: "Météo Vietnam — précipitations (Robusta)"
    source: "NOAA / météo"
    cle_courante: "meteo_vietnam_robusta"
    normalisation: "zscore"
    zscore_window: 60            # précipitations
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : sécheresse (z<-1 précip) => LONG
    poids: 4
    pertinence: { "24h": 0.2, "7j": 0.6, "1m": 0.9 }
    effet_long: "Sécheresse"
    effet_short: "Pluies normales"

  # Critère tendance-prix v3 — correctif famille trend-following (audit 10/06,
  # momentum-prix-sweep §5.2). cle=momentum_prix_20j_cafe, source=yfinance via KC=F
  # (Twelve ne sert PAS ce future : COFFEE=404, ETF au mauvais niveau écartés —
  # zéro invention ; KC=F reste l'identifiant interne ticker_principal),
  # poids initial 8 ramené à 6 (A3 prove-first, concertation 10/06), motif : la fiche n'avait aucun critère de tendance-prix propre →
  # incohérent avec la thèse trend-following. Signe +1 = on SUIT la tendance.
  # Calculé par la branche dédiée `momentum_prix_20j_` du dispatcher (A1,
  # 10/06) : VRAIE variation 20j puis z-score de la série de rendements. Pertinences = défaut
  # famille {24h:0.6, 7j:1.0, 1m:0.8} (brief 10/06 ; prime sur la reco sweep 0.7/0.7).
  - id: 11
    nom: "Tendance du café Arabica (20 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_20j_cafe"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.6, "7j": 1.0, "1m": 0.8 }
    effet_long: "Café en tendance haussière (z>+1)"
    effet_short: "Café en tendance baissière (z<-1)"

  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 9
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "Gel actif Brésil (T<0°C) OU CONAB <48h OU saison récolte avril-sept"
