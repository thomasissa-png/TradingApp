  # Convention de signe DOUTEUSE (audit point 5) : on N'ASSÈNE PAS de direction.
  meteo_cacao_cote_ivoire_ghana:
    phrase_long: "météo cacao Côte d'Ivoire/Ghana — driver dominant (convention de signe à valider)"
    phrase_short: "météo cacao Côte d'Ivoire/Ghana — driver dominant (convention de signe à valider)"
    phrase_neutre: "météo cacao Côte d'Ivoire/Ghana — driver dominant (convention de signe à valider)"

  cot_options_cacao:
