name: mesure-quotidienne

# Le Journaliste mesure chaque jour la qualité prédictive du bulletin.
# Cron UTC : 17h00 UTC ≈ 19h00 CET hiver / 19h00 CEST été.
# Stamp prix d'émission du jour + mesure des échéances 24h / 7j / 1m.
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mesure
  cancel-in-progress: false

jobs:
  run-journaliste:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: Run journaliste
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        working-directory: ${{ github.workspace }}
        run: python v3/scripts/run_journaliste.py

      - name: Commit and push performance + prix-emission
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          git add v3/data/performance.md v3/data/prix-emission/
          if git diff --cached --quiet; then
            echo "No journaliste changes to commit."
            exit 0
          fi
          git commit -m "chore(journaliste): daily measure update [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
