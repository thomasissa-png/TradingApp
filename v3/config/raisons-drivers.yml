    phrase_short: "taux longs US qui montent — pression sur la valorisation actions"

  vix_regime_seuils:
    phrase_long: "volatilité basse, régime risk-on porteur pour les actions"
    phrase_short: "volatilité élevée, régime risk-off pénalisant les actions"

  vix_niveau_absolu:
    phrase_long: "peur de marché au plancher — pas de prime de risque à payer"
    phrase_short: "pic de peur de marché — fuite vers la sécurité"

  vix_term_structure:
    phrase_long: "structure de vol tendue — la couverture court terme se paie"
    phrase_short: "structure de vol normalisée — la vol court terme se dégonfle"

  credit_spread_hy_us:
