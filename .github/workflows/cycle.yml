name: cycle-decision

# Objectif : 3 snapshots décisionnels complets par jour (~7h, ~12h, ~18h Paris).
# Un cycle atomique enchaîne : ingest news → calcul critères + bulletin + briefing → mesure perf,
# puis commit unique. Pas de polling continu (inutile pour un horizon 1-30 j, et préserve les
# quotas GNews/NewsAPI : 3 runs/j × 6 requêtes = 18/j, sous le free tier 100/j).
#
# Cron UTC (pas de DST auto) : 05h/10h/16h UTC = 07h/12h/18h Paris été (CEST) / 06h/11h/17h hiver (CET).
# REDONDANCE : 3 tentatives par créneau (:12, :27, :42) pour contrer l'abandon silencieux
# des schedules GitHub sous charge (incident 2026-06-01 : le run de 7h posté à :00 n'a jamais
# déclenché). Un garde-fou (step "Skip redundant") fait no-op les tentatives 2 et 3 si un
# snapshot a déjà été produit dans les 2h → 1 seul run réel par créneau.
on:
  schedule:
    - cron: "12,27,42 5,10,16 * * *"
  workflow_dispatch: {}
  # Répétition manuelle sans bouton (mobile) : pousser v3/RUN-CYCLE.txt déclenche un cycle.
  push:
    paths:
      - "v3/RUN-CYCLE.txt"

permissions:
  contents: write

concurrency:
  group: cycle-decision
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Guard — skip redundant intra-slot schedule attempts
        id: guard
        run: |
          # Redondance cron (3 tentatives/créneau). On ne lance le pipeline que si AUCUN
          # snapshot n'a été produit dans les 2 dernières heures (= même créneau déjà traité).
          # Les déclenchements manuels (push RUN-CYCLE.txt / workflow_dispatch) passent toujours.
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "Déclenchement manuel → run."; exit 0
          fi
          last=$(git log -1 --format=%ct --grep="decision snapshot" 2>/dev/null || echo 0)
          now=$(date +%s)
          if [ "${last:-0}" -gt 0 ] && [ $((now - last)) -lt 7200 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Snapshot il y a $(((now-last)/60)) min → tentative redondante, SKIP."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Pas de snapshot récent → run."
          fi

      - name: Setup Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: 1. Ingest news (RSS + early-signal + GNews/NewsAPI + extraction DeepSeek)
        if: steps.guard.outputs.run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
          LOG_LEVEL: INFO
        run: python v3/scripts/agent_news.py

      - name: 2. Bulletin (critères + scoring + briefing)
        if: steps.guard.outputs.run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GIE_AGSI_API_KEY: ${{ secrets.GIE_AGSI_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_bulletin.py

      - name: 3. Mesure perf (Journaliste — conclusions échues + prix d'émission)
        if: steps.guard.outputs.run == 'true'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_journaliste.py

      - name: Build HTML (page autonome de lecture des bulletins)
        if: steps.guard.outputs.run == 'true'
        run: python v3/scripts/build_html.py

      - name: Commit and push snapshot
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          git add v3/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(cycle): decision snapshot [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
