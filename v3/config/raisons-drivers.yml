  cftc_cot_cuivre:
    phrase_long: "positionnement spéculatif cuivre vendeur à l'extrême — potentiel de squeeze"
    phrase_short: "positionnement spéculatif cuivre acheteur saturé — longs à déboucler"

  ecart_taux_courts_us_de_2a:
    phrase_long: "écart de taux courts US−Allemagne qui se referme — soutien à l'euro"
    phrase_short: "écart de taux courts US−Allemagne large — le dollar paie mieux, euro sous pression"

  ecart_taux_longs_us_de_10a:
    phrase_long: "écart de taux longs US−Allemagne réduit — euro soutenu"
    phrase_short: "écart de taux longs US−Allemagne large — avantage de portage au dollar"

  dxy_trend_20j:
    phrase_long: "dollar en repli — vent porteur pour les matières premières en USD"
    phrase_short: "dollar fort — frein sur les matières premières en USD"

  usd_jpy_signal_risque:
