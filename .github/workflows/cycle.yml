name: cycle-decision

# Objectif : les rapports de la journée de bourse (refonte « 5 rapports » — spec
# v3/docs/reco/spec-refonte-5-rapports.md §5). Un seul workflow, le RUNNER lancé
# dépend de l'HEURE DE PARIS réelle (routage robuste DST, jamais d'offset en dur) :
#
#   Heure Paris   Runner             Rôle                                  Noté ?
#   07h           run_bulletin.py    R1 Briefing COMPLET (+ stamp continus) OUI (seul)
#   08h05         run_stamp.py       Stamp ouverture CONTINUS (prix-only)   non
#   09h05         run_stamp.py       Stamp ouverture EU/CAC (prix-only)     non
#   12h           run_suivi.py 12h   R2 Suivi léger (PAS le bulletin, Q9)   non
#   15h35         run_stamp.py       Stamp ouverture US (prix-only)         non
#   18h           run_suivi.py 18h   R3 Suivi léger                         non
#   22h15         run_bilan.py       R4 Bilan du jour (note les 24h)        note J
#
# Stamps d'ouverture (Q1 tranchée : capturer à la VRAIE ouverture) : 3 runs prix-only
# légers (un fetch Twelve par actif dont le marché vient d'ouvrir). stamp_prix_ouverture
# est idempotent + entry-lock → re-déclencher est sans effet. Le 7h stampe déjà les
# continus ; le 08h05 garantit la capture même si le 7h a raté ; 09h05/15h35 capturent
# EU/US à leur vraie ouverture (sinon le 12h/18h les prendrait avec 3h de retard).
#
# Cron UTC (pas de DST auto). Deux familles :
#   - créneaux RAPPORTS historiques 7h/12h/18h : UTC FIXE 05/10/16h (inchangé — ne
#     PAS churner ce cron, cf. project-context : re-registration fait sauter une
#     occurrence). 05/10/16h UTC = 07/12/18h Paris été / 06/11/17h hiver.
#   - créneaux NOUVEAUX (stamps + bilan 22h15) : CRON HORAIRE `12,27,42 * * * *` +
#     GARDE HEURE-PARIS dans le step de routage. Robuste été/hiver : on ne parie
#     JAMAIS sur un offset UTC figé (22h15 Paris = 20h15 UTC été MAIS 21h15 UTC
#     hiver ; un `20h UTC` fixe noterait avant la clôture NYSE 5 mois/an). Le cron
#     horaire tire chaque heure, la garde heure-Paris ne déclenche qu'aux bons
#     créneaux. Coût négligeable (no-op des heures sans créneau, avant tout setup).
# REDONDANCE : 3 tentatives par créneau (:12, :27, :42) pour contrer l'abandon
# silencieux des schedules GitHub. Anti-doublon (snapshot < 2h) → 1 run réel/créneau.
on:
  schedule:
    # Rapports historiques (UTC fixe, inchangé) : 7h/12h/18h Paris.
    - cron: "12,27,42 5,10,16 * * *"
    # Stamps + bilan 22h15 (cron horaire + garde heure-Paris dans le step routage).
    # Plage 6-21h UTC : couvre 08h05/09h05 (06-07h UTC été, 07-08h hiver),
    # 15h35 (13h UTC été, 14h hiver) et 22h15 Paris (20h UTC été, 21h UTC hiver).
    - cron: "12,27,42 6,7,8,13,14,20,21 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forcer le run même le week-end (échappatoire manuelle). Le VPS ne passe JAMAIS force=true → garde week-end appliquée."
        type: boolean
        default: false
  # Répétition manuelle sans bouton (mobile) : pousser v3/RUN-CYCLE.txt déclenche un cycle.
  push:
    paths:
      - "v3/RUN-CYCLE.txt"

permissions:
  contents: write
  # TEMPORAIRE (11/06) : permet au slot stamp 8h de dispatcher la sonde
  # probe-futures-8h (relais fiable — le schedule GitHub de la sonde saute
  # des occurrences). À retirer avec le relais après verdict A/B réf 8h.
  actions: write

concurrency:
  group: cycle-decision
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Guard — jour de bourse NO-OP (week-end + fériés) + redondance intra-créneau
        id: guard
        env:
          # Input booléen exposé seulement sur workflow_dispatch (vide sinon).
          FORCE_INPUT: ${{ github.event.inputs.force }}
        run: |
          # ===================================================================
          # TABLE DE VÉRITÉ  (déclencheur × jour × force → run ?)
          # -------------------------------------------------------------------
          #   déclencheur            jour          force  → run ?  pourquoi
          #   schedule               lun-ven ouvré   —    → OUI*   jour de bourse (*sauf doublon ×3)
          #   schedule               sam/dim         —    → NON    week-end : marchés fermés
          #   schedule               jour férié      —    → NON    férié de marché : prix figés ← FIX
          #   dispatch (VPS)         lun-ven ouvré  false → OUI    jour de bourse (driver réel)
          #   dispatch (VPS)         sam/dim        false → NON    week-end : marchés fermés
          #   dispatch (VPS)         jour férié     false → NON    férié de marché : prix figés ← FIX
          #   dispatch (force)       férié/we       true  → OUI    échappatoire humaine (bypass)
          #   push RUN-CYCLE.txt     férié/we        —    → OUI    échappatoire humaine (bypass)
          #
          # « jour férié » = calculé AUTO par la lib `holidays` (NYSE XNYS +
          # Euronext XECB) pour l'année courante via is_trading_day → couvre
          # 2026/2027/2028… sans maintenance. La logique de la table est
          # inchangée ; seule la SOURCE des fériés devient automatique.
          #
          # Principe : la coupure s'applique à TOUS les déclencheurs AUTOMATIQUES
          # (schedule ET workflow_dispatch sans force = le cas du VPS) dès que la
          # bourse est FERMÉE (week-end OU férié de marché). Ces jours-là les
          # prix sont figés à la dernière clôture → bulletin sur prix morts +
          # mesures 24h dégénérées (« +0.0% ») qui polluent le shadow. Seul un
          # FORÇAGE EXPLICITE (force=true / push RUN-CYCLE.txt) bypass la garde.
          #
          # « Jour de bourse ouvert » = is_trading_day(d) de v3/scripts/journaliste.py
          # (SOURCE DE VÉRITÉ UNIQUE : not week-end and not _is_market_holiday).
          # FÉRIÉS AUTO : _is_market_holiday calcule les fériés via la lib
          # `holidays` (NYSE XNYS + Euronext XECB) pour l'année testée → valable
          # 2026/2027/2028… sans maintenance manuelle. On installe donc la lib
          # (pure-python, ~2s) AVANT l'appel ci-dessous, car la garde tourne AVANT
          # le setup des deps. ROBUSTESSE : si ce pip échoue (réseau down),
          # _is_market_holiday retombe sur le socle statique MARKET_HOLIDAYS sans
          # jamais planter — la garde reste déterministe et ne bloque JAMAIS un
          # jour ouvré normal (un crash = NO-OP permanent, interdit). ZÉRO liste
          # de fériés dupliquée dans ce YAML : divergence structurellement
          # impossible.
          # ===================================================================

          # --- 1. Forçage explicite = échappatoire humaine → run, bypass tout (week-end + fériés inclus)
          #     a) workflow_dispatch avec input force=true   b) push RUN-CYCLE.txt
          if [ "${FORCE_INPUT}" = "true" ] || [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Forçage explicite (force=${FORCE_INPUT:-n/a} / event=${GITHUB_EVENT_NAME}) → run, bypass garde jour de bourse."
            exit 0
          fi

          # --- 2. Déclencheurs automatiques (schedule OU dispatch-VPS sans force) : garde JOUR DE BOURSE
          #     Marchés actions fermés sam/dim ET jours fériés → prix figés à la
          #     dernière clôture. Un run produirait un bulletin sur prix morts et
          #     des mesures 24h dégénérées, polluant les stats. On délègue le
          #     verdict « jour de bourse ouvert » à is_trading_day (calendrier
          #     unique NYSE ∪ Euronext de journaliste.py — aucune date recopiée ici).
          today_paris=$(TZ='Europe/Paris' date +%Y-%m-%d)  # AAAA-MM-JJ heure de Paris
          # Fériés AUTO : la lib `holidays` est la source primaire de
          # _is_market_holiday (XNYS + XECB, toute année). On l'installe ici (la
          # garde tourne AVANT le setup des deps). `|| true` : si le pip échoue
          # (réseau), on N'INTERROMPT PAS — _is_market_holiday retombe sur le
          # socle statique MARKET_HOLIDAYS (try/except import), la garde reste
          # robuste et ne bloque jamais un jour ouvré normal.
          pip install -q holidays || echo "pip install holidays a échoué → fallback socle statique MARKET_HOLIDAYS."
          # On passe le code via `-c` (pas de heredoc indenté : l'indentation YAML
          # casserait l'indentation Python). `is_trading_day` = SOURCE DE VÉRITÉ
          # UNIQUE (réutilise _is_market_holiday). exit 0 = bourse ouverte (on
          # continue) ; exit 1 = fermée (NO-OP plus bas).
          export TODAY_PARIS="$today_paris"
          if ! python3 -c "import os, sys; sys.path.insert(0, 'v3/scripts'); from journaliste import is_trading_day; from datetime import date; y, m, d = (int(x) for x in os.environ['TODAY_PARIS'].split('-')); sys.exit(0 if is_trading_day(date(y, m, d)) else 1)"; then
            # is_trading_day == False : week-end OU férié de marché → NO-OP.
            dow=$(TZ='Europe/Paris' date +%u)  # 1=lundi … 6=samedi, 7=dimanche
            if [ "$dow" -ge 6 ]; then
              raison="week-end (jour=$dow)"
            else
              raison="férié de marché ${today_paris}"
            fi
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Marchés fermés : ${raison}, Europe/Paris + déclenchement automatique (${GITHUB_EVENT_NAME}) → NO-OP."
            exit 0
          fi

          # --- 3. Jour ouvré : anti-doublon ×3 pour le SCHEDULE uniquement.
          #     Le schedule tire 3×/créneau (:12/:27/:42) → on no-op les tentatives
          #     2 et 3 si un snapshot a déjà été produit dans les 2h. Le VPS, lui,
          #     tire 1×/créneau (workflow_dispatch sans redondance) → on le laisse
          #     toujours passer (comportement actuel préservé, pas d'anti-doublon).
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Jour ouvré + déclenchement ${GITHUB_EVENT_NAME} (VPS, 1 tir/créneau) → run."
            exit 0
          fi
          last=$(git log -1 --format=%ct --grep="decision snapshot\|decision suivi\|decision bilan\|stamp ouverture" 2>/dev/null || echo 0)
          now=$(date +%s)
          if [ "${last:-0}" -gt 0 ] && [ $((now - last)) -lt 7200 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Snapshot il y a $(((now-last)/60)) min → tentative schedule redondante, SKIP."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Jour ouvré + schedule, pas de snapshot récent → run."
          fi

      - name: Route — slot selon l'heure de Paris réelle (DST-safe)
        id: route
        if: steps.guard.outputs.run == 'true'
        run: |
          # ===================================================================
          # ROUTAGE PAR HEURE DE PARIS (jamais d'offset UTC en dur — DST-safe).
          # La garde a déjà validé « run autorisé ce jour ». Ici on choisit QUEL
          # runner lancer selon l'heure de Paris réelle au moment du tir :
          #
          #   créneau Paris   slot       runner lancé
          #   07h (06-08h)    bulletin   run_bulletin.py (R1 complet, + stamp continus)
          #   08h (08-09h)    stamp      run_stamp.py  (ouverture continus)
          #   09h (09-10h)    stamp      run_stamp.py  (ouverture EU/CAC)
          #   12h (11-13h)    suivi12    run_suivi.py 12h (R2 léger)
          #   15h (15-16h)    stamp      run_stamp.py  (ouverture US)
          #   18h (17-19h)    suivi18    run_suivi.py 18h (R3 léger)
          #   22h ≥22h15      bilan      run_bilan.py  (R4 — note les 24h)
          #   (autre heure)   none       NO-OP (cron horaire qui ne tombe sur aucun créneau)
          #
          # Les plages horaires absorbent l'écart été/hiver (le cron UTC fixe 5/10/16h
          # tombe à 6h/11h/17h Paris en hiver, 7h/12h/18h en été) ET le retard
          # schedule GitHub de 1-3h n'est PAS absorbé ici — c'est le rôle de l'heure
          # de tir du VPS (à l'heure pile) ; le schedule retardé tombera dans la
          # plage du créneau suivant le plus proche, ou en `none` si trop décalé.
          # ===================================================================
          ph=$(TZ='Europe/Paris' date +%H)
          pm=$(TZ='Europe/Paris' date +%M)
          ph=$((10#$ph)); pm=$((10#$pm))
          slot="none"
          if   [ "$ph" -ge 6 ]  && [ "$ph" -le 7 ];  then slot="bulletin"
          elif [ "$ph" -eq 8 ];                       then slot="stamp"
          elif [ "$ph" -eq 9 ];                       then slot="stamp"
          elif [ "$ph" -ge 11 ] && [ "$ph" -le 12 ]; then slot="suivi12"
          elif [ "$ph" -eq 15 ];                      then slot="stamp"
          elif [ "$ph" -ge 17 ] && [ "$ph" -le 18 ]; then slot="suivi18"
          elif [ "$ph" -eq 22 ] && [ "$pm" -ge 15 ]; then slot="bilan"
          fi
          echo "slot=$slot" >> "$GITHUB_OUTPUT"
          # TEMPORAIRE (11/06) : fenêtre du relais sonde 8h (8h00-8h30 Paris strict —
          # un dispatch hors fenêtre ne prouverait rien sur la réf 8h).
          if [ "$ph" -eq 8 ] && [ "$pm" -le 30 ]; then
            echo "probe8h=true" >> "$GITHUB_OUTPUT"
          else
            echo "probe8h=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Heure Paris ${ph}h${pm} → slot=${slot}."
          if [ "$slot" = "none" ]; then
            echo "Aucun créneau à cette heure (cron horaire hors créneau) → NO-OP."
          fi

      - name: Setup Python
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot != 'none'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot != 'none'
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      # ----- Slot BULLETIN (07h) : R1 Briefing COMPLET = ingest → bulletin → mesure -----
      - name: 1. Ingest news (RSS + early-signal + GNews/NewsAPI + extraction DeepSeek)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'bulletin'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
          LOG_LEVEL: INFO
        run: python v3/scripts/agent_news.py

      - name: 2. Bulletin (critères + scoring + briefing — stampe aussi l'ouverture des continus)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'bulletin'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GIE_AGSI_API_KEY: ${{ secrets.GIE_AGSI_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_bulletin.py

      - name: 3. Mesure perf (Journaliste — conclusions échues + prix d'émission)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'bulletin'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_journaliste.py

      - name: Build HTML (page autonome de lecture des bulletins)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'bulletin'
        run: python v3/scripts/build_html.py

      # ----- Slot STAMP (08h05 continus / 09h05 EU / 15h35 US) : prix-only, léger -----
      - name: Stamp ouverture (prix-only — capture la VRAIE ouverture, idempotent)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'stamp'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_stamp.py

      # TEMPORAIRE (11/06) : relais fiable de la sonde 8h. Le schedule GitHub de
      # probe-futures-8h saute des occurrences (0 run le 11/06 malgré le cron) ;
      # ce run de stamp est déclenché par le VPS à 8h15 Paris = en plein dans la
      # fenêtre 8h00-8h30. Non-bloquant (|| true) : un échec de dispatch ne casse
      # JAMAIS le stamp. Curl sur UNE ligne (leçon 02/06). À RETIRER (avec le
      # cron de la sonde et la permission actions:write) après verdict A/B.
      - name: Relais sonde 8h (TEMPORAIRE — dispatch probe-futures-8h)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'stamp' && steps.route.outputs.probe8h == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -o /dev/null -w "dispatch sonde 8h -> HTTP %{http_code}\n" -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/actions/workflows/probe-futures-8h.yml/dispatches" -d '{"ref":"main"}' || true

      # ----- Slot SUIVI 12h (R2 léger — PAS le bulletin complet, Q9) -----
      - name: Suivi 12h (R2 — statut vs ouverture, dynamique, suggestions de sortie)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'suivi12'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_suivi.py 12h

      # ----- Slot SUIVI 18h (R3 léger) -----
      - name: Suivi 18h (R3 — statut vs ouverture + dynamique intraday US)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'suivi18'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_suivi.py 18h

      # ----- Slot BILAN 22h15 Paris (R4 — note les 24h, win rate du jour) -----
      - name: Bilan du jour 22h15 (R4 — note les calls 7h ouverture→clôture)
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot == 'bilan'
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/run_bilan.py

      - name: Commit and push snapshot
        if: steps.guard.outputs.run == 'true' && steps.route.outputs.slot != 'none'
        env:
          SLOT: ${{ steps.route.outputs.slot }}
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          # Message de commit traçant le slot (utilisé par l'anti-doublon ×3 du Guard).
          case "$SLOT" in
            bulletin) msg="chore(cycle): decision snapshot [skip ci]" ;;
            stamp)    msg="chore(cycle): stamp ouverture [skip ci]" ;;
            suivi12)  msg="chore(cycle): decision suivi 12h [skip ci]" ;;
            suivi18)  msg="chore(cycle): decision suivi 18h [skip ci]" ;;
            bilan)    msg="chore(cycle): decision bilan 22h [skip ci]" ;;
            *)        msg="chore(cycle): snapshot [skip ci]" ;;
          esac
          git add v3/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "$msg"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
