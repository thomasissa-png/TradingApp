# Nasdaq — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Nasdaq"
ticker_principal: "^IXIC"
famille: "indices"
news_zone: "US"
version: 2
seuils_reussite_pct:
  "24h": 0.7
  "7j": 1.5
  "1m": 4.0

criteres:
  - id: 1
    nom: "Taux d'intérêt réels US (10 ans)"
    source: "FRED (DFII10)"
    cle_courante: "taux_10y_us_reels_tips"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : TIPS baisse (z<-1) => LONG
    poids: 11
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "TIPS baisse (z<-1)"
    effet_short: "TIPS monte (z>+1)"

  - id: 2
    nom: "Régime de volatilité Nasdaq (VXN)"
    source: "Twelve Data"
    cle_courante: "vxn_regime"
    normalisation: "mapping_non_monotone"   # non-monotone : +1 au centre, -1 aux extrêmes ; échelle à calibrer
    centre_optimal: 20
    cap: 1.0
    signe: 1
    poids: 7
    pertinence: { "24h": 0.9, "7j": 0.6, "1m": 0.3 }
    effet_long: "VXN=18-22"
    effet_short: "VXN>35 OU <14"

  - id: 3
    nom: "Tendance des semi-conducteurs (5 jours)"
    source: "Twelve Data"
    cle_courante: "sox_trend_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 7
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "SOX hausse (z>+1)"
    effet_short: "SOX baisse (z<-1)"

  - id: 4
    nom: "Participation des actions au rallye Nasdaq"
    # PROXY QQQE/QQQ — pas le vrai % >MA50. Participation interne Nasdaq-100 via
    # ratio equal-weight (QQQE) / cap-weight (QQQ) : ratio en hausse = rallye
    # large (participation saine) = haussier ; ratio en baisse = rallye porté
    # par les méga-caps tech (breadth qui se dégrade) = baissier.
    source: "Twelve Data (proxy QQQE/QQQ)"
    cle_courante: "breadth_nasdaq100_ma50"
    normalisation: "zscore"        # ratio ~0.x → z-score (l'ancien centre-50 ne s'applique plus)
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1                       # ratio EW/CW en hausse = participation large = haussier
    poids: 6                       # absorbe concentration_top7 (id=5, poids 5) — dedup audit Cowork 10/06 : même phénomène (domination méga-caps vs breadth large), corrélés inverse (-1) — concentration↑ ⇔ ratio QQQE/QQQ↓. Poids avant 6 → après 6 (= max(6,5)). Donnée secondaire (concentration top7) abandonnée car le schéma fiche ne supporte pas de source fallback → breadth primaire seule.
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "QQQE/QQQ en hausse (participation large)"
    effet_short: "QQQE/QQQ en baisse (rallye méga-caps)"

  - id: 6
    nom: "Sentiment sur l'IA et les méga-caps tech"
    source: "events-log L1=Tech-IA (7j)"
    cle_courante: "sentiment_ia_megacaps"
    normalisation: "triplet"     # +1 beat+guidance haussière / 0 / -1 miss OU correction guidance
    cap: 1.0
    signe: 1
    poids: 5
    # [BOOST NEWS 24h — refonte 23/06] pertinence 24h 0.8 → 1.0 (porteur synthèse
    # news net IA Nasdaq) : une grosse news tech/earnings fraîche doit pouvoir
    # dominer la conviction 24h. 7j/1m INCHANGÉS.
    pertinence: { "24h": 1.0, "7j": 0.9, "1m": 0.5 }
    effet_long: "Beat earnings + guidance haussière"
    effet_short: "Miss OU correction guidance"

  - id: 7
    nom: "Flux vers le fonds Nasdaq (5 jours)"
    source: "Twelve Data / fournisseur flux"
    cle_courante: "flux_etf_qqq_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Entrées >+1σ"
    effet_short: "Sorties <-1σ"

  - id: 8
    nom: "Écart de performance Nasdaq − petites valeurs US"
    source: "Twelve Data (calculé)"
    cle_courante: "spread_nasdaq_russell2000"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : Russell out-perf (breadth saine) => LONG
    poids: 4
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Russell out-perf (breadth saine)"
    effet_short: "Nasdaq out-perf très large"

  - id: 9
    nom: "Indicateur technique Nasdaq (RSI 14 jours)"
    source: "Twelve Data (calculé)"
    cle_courante: "rsi_14j_ixic"
    normalisation: "lineaire"
    centre: 50.0
    echelle: 25.0                # RSI 30/75 → demi-span ~25 ; à calibrer
    cap: 1.0
    signe: -1                    # inversé : RSI=30 => LONG
    poids: 2
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "RSI=30"
    effet_short: "RSI>75"

  # Critère tendance-prix v3 — fin de la famille trend-following (audit
  # momentum-family 10/06, A8 : indices plafonnés à 4-5, RSI poids 2 CONSERVÉ).
  # cle=momentum_prix_20j_nasdaq, source=Twelve Data via proxy ETF QQQ (cf.
  # flux_etf_qqq_5j). poids=4 (plafond A8) : tendance prix directe, distincte du
  # sox_trend_5j (semis 5j) et du RSI (id=9, conservé à 2). Signe +1 = on SUIT la
  # tendance. VRAIE variation 20j puis z-score de la série de rendements (A1,
  # dispatcher par préfixe `momentum_prix_20j_`).
  - id: 11
    nom: "Tendance du Nasdaq (20 jours)"
    source: "Twelve Data (proxy ETF QQQ)"
    cle_courante: "momentum_prix_20j_nasdaq"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : Nasdaq en tendance haussière (z>+1) = tendance suivie => LONG
    poids: 4                     # plafond indices A8 (4-5) ; prove-first, RSI poids 2 conservé. Cf. CHANGELOG 11/06.
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Nasdaq en tendance haussière (z>+1)"
    effet_short: "Nasdaq en tendance baissière (z<-1)"

  - id: 12
    nom: "Tendance du Nasdaq (7 jours)"
    source: "Twelve Data (proxy ETF QQQ)"
    cle_courante: "momentum_prix_7j_nasdaq"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : Nasdaq en tendance haussière (z>+1) = tendance suivie => LONG
    poids: 4                     # plafond indices A8 (4-5) ; prove-first, RSI poids 2 conservé. Cf. CHANGELOG 11/06.
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Nasdaq en tendance haussière (z>+1)"
    effet_short: "Nasdaq en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 13
    nom: "Tendance du Nasdaq (3 jours)"
    source: "Twelve Data (proxy ETF QQQ)"
    cle_courante: "momentum_prix_3j_nasdaq"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : Nasdaq en tendance haussière (z>+1) = tendance suivie => LONG
    poids: 4                     # plafond indices A8 (4-5) ; prove-first, RSI poids 2 conservé. Cf. CHANGELOG 11/06.
    pertinence: { "24h": 1.0, "7j": 0.6, "1m": 0.1 }   # [3j ajout 30/06] F3a_momentum_court (mène le jour)
    effet_long: "Nasdaq en tendance haussière (z>+1)"
    effet_short: "Nasdaq en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.

  - id: 10
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "VXN>40 OU FOMC/CPI <24h OU earnings méga-cap cette semaine"
