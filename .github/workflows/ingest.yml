name: ingest-news

# Cron UTC. Cible : toutes les 30 min entre 7h-20h CET, lun-ven.
# En CET (UTC+1 hiver / UTC+2 été), 7-20 CET ≈ 5-19 UTC (hiver) ou 5-18 UTC (été).
# On élargit volontairement de 5h à 19h UTC pour couvrir les deux régimes ;
# la fenêtre 7-20 CET est gérée côté Python si besoin.
on:
  schedule:
    - cron: "*/30 5-19 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ingest-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: Run agent_news (one-shot)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
          LOG_LEVEL: INFO
        working-directory: ${{ github.workspace }}
        run: python v3/scripts/agent_news.py

      - name: Commit and push data updates
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          git add v3/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(ingest): events-log update [skip ci]"
          # Push avec retry simple en cas de course
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          exit 1
