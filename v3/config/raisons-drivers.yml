# Alias : clé RÉELLE du pipeline (decision-log) → clé canonique de `drivers`
# ci-dessus. L'audit a documenté des `cle_courante` idéalisées ; le pipeline
# vivant utilise des noms voisins. Ces alias rebranchent la phrase experte
# (au lieu de tomber sur le fallback nom canonique). Résolus AVANT le matching
# par préfixe. La convention de signe douteuse du cacao est PRÉSERVÉE via l'alias.
aliases:
  ratio_gold_silver: ratio_or_argent
  mouvement_or_5j: momentum_or_5j
  cftc_cot_copper_nets: cftc_cot_cuivre
  cftc_cot_silver: cftc_cot_nets
  cftc_cot_eur_nets: cftc_cot_nets
  cftc_cot_vix_nets: cftc_cot_nets
  cftc_cot_wheat: cot_ble
  cftc_cot_coffee: cftc_cot_nets
  differentiel_taux_2y_us_de: ecart_taux_courts_us_de_2a
  differentiel_taux_10y_us_bund: ecart_taux_longs_us_de_10a
  taux_10y_us_delta_5j: variation_taux_10y_5j
  hy_credit_spread: credit_spread_hy_us
  vix_regime: vix_regime_seuils
  niveau_vix_absolu: vix_niveau_absolu
  term_structure_vix_vix3m: vix_term_structure
  spread_oat_bund_10y: ecart_taux_fr_de_10a
  alpha_cac_vs_sp_5j: surperf_cac_sp500_5j
  noaa_drought_midwest_plains: secheresse_plaines_us
  usd_brl: usd_brl_cafe
  maladies_cabosses_rouille: maladies_cafeier
  cycle_bresil_biannuel: cycle_production_bresil_cafe
  usd_jpy_proxy_risk: usd_jpy_signal_risque
  tension_geopolitique_active: tension_geopolitique
  # Cacao météo — convention de signe DOUTEUSE conservée (alias vers la clé douteuse).
  meteo_ci_ghana_precip_30j: meteo_cacao_cote_ivoire_ghana
  hf_positioning_flux_options: cot_options_cacao
  spread_brent_wti: brent_term_structure_m1m2

# Familles à clé SUFFIXÉE par actif (ex. momentum_prix_20j_petrole) : matching
# par préfixe. Chaque préfixe pointe vers une paire de phrases génériques.
# (Le matching exact `drivers` ci-dessus prime toujours sur les préfixes.)
prefixes:
  momentum_prix_20j_:
    phrase_long: "tendance 20 jours haussière — on suit le momentum"
    phrase_short: "tendance 20 jours baissière — on suit la baisse"
  variation_taux_10y_5j:
    phrase_long: "taux longs US qui refluent — bouffée d'oxygène pour les actions"
    phrase_short: "taux longs US qui montent — pression sur la valorisation actions"
  momentum_cac_20j:
    phrase_long: "tendance CAC 20 jours haussière — on suit le momentum"
    phrase_short: "tendance CAC 20 jours baissière — on suit la baisse"
