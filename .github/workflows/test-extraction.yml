name: test-extraction

# Test traçable de l'extraction DeepSeek (lancement manuel).
# Montre, pour de vraies news : input → prompt → JSON brut DeepSeek → interprétation → routing.
# Écrit v3/data/test-extraction-report.md (commité) — lisible ensuite dans le repo.
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source des news (rss = fetch en direct, events = derniers de events-log)"
        type: choice
        options: ["rss", "events"]
        default: "rss"
      n:
        description: "Nombre de news (0 = TOUTES les news du cycle)"
        type: string
        default: "0"

permissions:
  contents: write

jobs:
  test-extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: v3/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v3/requirements.txt

      - name: Run test extraction
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          LOG_LEVEL: INFO
        run: python v3/scripts/test_extraction.py --source "${{ inputs.source }}" --n "${{ inputs.n }}"

      - name: Commit report
        run: |
          git config user.name  "tradingapp-bot"
          git config user.email "tradingapp-bot@users.noreply.github.com"
          git add v3/data/test-extraction-report.md
          if git diff --cached --quiet; then
            echo "No report change."
            exit 0
          fi
          git commit -m "test(extraction): rapport DeepSeek traçable [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin HEAD:"${GITHUB_REF_NAME}" && exit 0
            sleep 5
          done
          exit 1
