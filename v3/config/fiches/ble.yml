# Blé — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Blé"
ticker_principal: "ZW=F"
famille: "agri"
news_zone: "US + EU + Mer Noire + AU"
version: 2
seuils_reussite_pct:
  "24h": 0.8
  "7j": 2.5
  "1m": 6.0

criteres:
  - id: 1
    nom: "Stocks mondiaux de blé (rapport USDA mensuel)"
    source: "USDA WASDE (mensuel)"
    cle_courante: "usda_wasde_stocks_to_use"
    normalisation: "zscore"
    zscore_window: 12            # 12 publications
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : ratio baisse (offre serrée) => LONG
    poids: 11
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "Ratio baisse (offre serrée)"
    effet_short: "Ratio monte (oversupply)"

  # FIX LABEL↔DONNÉE + SIGNE (18/06). Le label disait « drought, z>+1 = LONG » MAIS
  # la donnée RÉELLEMENT injectée (clé dans METEO_CRITERIA → fetch_open_meteo_anomaly)
  # n'est PAS un indice de sécheresse : c'est une anomalie de PRÉCIPITATIONS signée
  # (z>0 = PLUS de pluie que la normale, z<0 = sécheresse). L'ancien `zscore`+`signe:1`
  # rendait donc « z>+1 = LONG » alors que z>+1 = excès de pluie (pas sécheresse) — le
  # label « drought » était faux et le signe ne décrivait pas la sécheresse.
  # LECTURE AGRONOMIQUE RETENUE = SYMÉTRIQUE (comme cacao) : sur les plaines à blé US
  # (HRW/SRW), la SÉCHERESSE (z<0, stress hydrique) ET les EXCÈS de pluie (z>0 :
  # inondation, maladies fongiques, qualité dégradée, récolte retardée) menacent tous
  # deux la récolte = HAUSSIER ; précipitations proches de la normale = baissier. D'où
  # `normalisation: zscore_abs` (|z|, réutilise zscore_abs_normalisee via _handle_meteo).
  # cle_courante INCHANGÉE (L023 — clé d'agrégation stable) ; nom/effets rendus honnêtes.
  # ⚠️ ZÉRO cutover sur la valeur du jour : z courant = +0.30 (>0) → |z|/div ≡ z/div,
  # valeur normalisée IDENTIQUE → direction blé du jour INCHANGÉE. Seul le côté sécheresse
  # (z<0), jusqu'ici compté baissier à tort, devient haussier.
  - id: 2
    nom: "Écart à la normale des précipitations — plaines céréalières US (sécheresse OU excès)"
    source: "Open-Meteo (anomalie précipitations vs climato 5 ans)"
    cle_courante: "noaa_drought_midwest_plains"
    normalisation: "zscore_abs"
    zscore_window: 60
    zscore_div: 2
    zscore_centre: 0.0           # déviation jugée « normale » (en z) ; 0 = neutre au centre
    cap: 1.0
    signe: 1                     # +1 : norm>0 (écart à la normale) => HAUSSIER
    poids: 9
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "Sécheresse (précip < normale) OU excès de pluie (inondation/qualité)"
    effet_short: "Précipitations proches de la normale"

  - id: 3
    nom: "Tensions géopolitiques en mer Noire"
    source: "events-log"
    cle_courante: "geopolitique_mer_noire"
    normalisation: "triplet"     # +1 escalade 14j / 0 / -1 détente
    cap: 1.0
    signe: 1
    poids: 8
    # [BOOST NEWS 24h — refonte 23/06] pertinence 24h 0.7 → 1.0 (porteur synthèse
    # news net IA blé) : une grosse news mer Noire fraîche doit pouvoir dominer la
    # conviction 24h. 7j/1m INCHANGÉS.
    pertinence: { "24h": 1.0, "7j": 0.9, "1m": 0.7 }
    effet_long: "Escalade (blocus/rupture corridor/sanctions) 14j"
    effet_short: "Détente (accord/reconduction)"

  - id: 4
    nom: "État des cultures US (bon / excellent)"
    source: "USDA NASS"
    cle_courante: "nass_crop_progress"
    normalisation: "zscore"
    zscore_window: 5             # même semaine 5 ans
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : <50% (z<-1) => LONG
    poids: 6
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "<50% (z<-1)"
    effet_short: ">70% (z>+1)"

  - id: 5
    nom: "Demande chinoise à l'import (blé)"
    source: "USDA FAS"
    cle_courante: "demande_chinoise_imports"
    normalisation: "zscore"
    zscore_window: 12            # 12 mois
    zscore_div: 2
    cap: 1.0
    signe: 1                     # direct
    poids: 5
    pertinence: { "24h": 0.1, "7j": 0.3, "1m": 1.0 }
    effet_long: "> consensus"
    effet_short: "< consensus"

  - id: 6
    nom: "Positionnement des gros spéculateurs (blé)"
    source: "CFTC (vendredi)"
    cle_courante: "cftc_cot_wheat"
    normalisation: "zscore"
    zscore_window: 252
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : nets SHORT extreme => LONG (squeeze)
    poids: 5
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Nets SHORT extreme"
    effet_short: "Nets LONG extreme"

  - id: 7
    nom: "Météo dans les zones céréalières australiennes"
    source: "BoM / météo (NSW/VIC/WA)"
    cle_courante: "meteo_australie_dryland"
    normalisation: "zscore"
    zscore_window: 60            # précipitations
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : sécheresse (z<-1 précip) => LONG
    poids: 5
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "Sécheresse persistante"
    effet_short: "Normales/favorables"

  - id: 8
    nom: "Appels d'offres blé de l'Égypte"
    source: "GASC"
    cle_courante: "egypte_gasc_tenders"
    normalisation: "zscore"
    zscore_window: 12            # 12 tenders
    zscore_div: 2
    cap: 1.0
    signe: 1                     # direct
    poids: 4
    pertinence: { "24h": 0.0, "7j": 0.3, "1m": 1.0 }   # [reweight 30/06] F5_fond_lent
    effet_long: "Tender massif + prix élevé"
    effet_short: "Annulation OU prix très bas"

  - id: 9
    nom: "Tendance du dollar (20 jours)"
    source: "Twelve Data"
    cle_courante: "dxy_trend_20j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : DXY baisse => LONG
    poids: 4
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "DXY baisse"
    effet_short: "DXY monte"

  # Critère tendance-prix v3 — correctif famille trend-following (audit 10/06,
  # momentum-prix-sweep §5.3). cle=momentum_prix_20j_ble, source=yfinance via ZW=F
  # (Twelve ne sert PAS ce future : WHEAT=404, ETF au mauvais niveau écartés —
  # zéro invention ; ZW=F reste l'identifiant interne ticker_principal),
  # poids initial 8 ramené à 6 (A3 prove-first, concertation 10/06), motif : la fiche n'avait aucun critère de tendance-prix propre →
  # incohérent avec la thèse trend-following. Signe +1 = on SUIT la tendance.
  # Calculé par la branche dédiée `momentum_prix_20j_` du dispatcher (A1,
  # 10/06) : VRAIE variation 20j puis z-score de la série de rendements. Pertinences = défaut
  # famille {24h:0.6, 7j:1.0, 1m:0.8} (brief 10/06).
  - id: 11
    nom: "Tendance du blé (20 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_20j_ble"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }   # [reweight 30/06] F4_moyen
    effet_long: "Blé en tendance haussière (z>+1)"
    effet_short: "Blé en tendance baissière (z<-1)"

  - id: 12
    nom: "Tendance du blé (7 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_7j_ble"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.5, "7j": 1.0, "1m": 0.3 }   # [reweight 30/06] F3b_momentum_7j
    effet_long: "Blé en tendance haussière (z>+1)"
    effet_short: "Blé en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 13
    nom: "Tendance du blé (3 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_3j_ble"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 1.0, "7j": 0.6, "1m": 0.1 }   # [3j ajout 30/06] F3a_momentum_court (mène le jour)
    effet_long: "Blé en tendance haussière (z>+1)"
    effet_short: "Blé en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.

  - id: 10
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "USDA WASDE <7j OU saison récolte US (mai-août)/AU (nov-jan) OU mouvement corridor mer Noire 48h"
