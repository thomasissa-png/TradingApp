# Cuivre — fiche de positionnement v2
# Converti depuis _SOURCE-fiches-md.md selon SCHEMA-fiche.md + template petrole.yml.
# Échelles linéaires dérivées des seuils énoncés → à calibrer (poids v0 éditoriaux).
actif: "Cuivre"
ticker_principal: "HG=F"
famille: "métaux-industriels"
news_zone: "Global"
version: 2
seuils_reussite_pct:
  "24h": 0.8
  "7j": 2.0
  "1m": 5.0

criteres:
  - id: 1
    nom: "Activité industrielle Chine (indice PMI)"
    source: "Caixin (mensuel)"
    cle_courante: "caixin_pmi_manuf"
    normalisation: "lineaire"
    centre: 50.0
    echelle: 1.3                 # >52 / <48 ; facteur ×1,5 → echelle réduite (~1,3 pt) ; à calibrer
    cap: 1.0
    signe: 1
    poids: 12
    pertinence: { "24h": 0.1, "7j": 0.4, "1m": 1.0 }
    effet_long: "PMI>52"
    effet_short: "PMI<48"

  - id: 2
    nom: "Stocks de cuivre mondiaux (tendance 5 jours)"
    source: "LME + SHFE"
    cle_courante: "inventaires_lme_shfe_5j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : inventaires baissent (z<-1) => LONG
    poids: 8
    pertinence: { "24h": 0.3, "7j": 1.0, "1m": 0.9 }
    effet_long: "Inventaires baissent (z<-1)"
    effet_short: "Inventaires montent (z>+1)"

  - id: 3
    nom: "Grèves minières (Chili / Pérou)"
    source: "events-log"
    cle_courante: "mining_strikes_chili_perou"
    normalisation: "triplet"     # +1 grève active/annonce 30j / 0 / -1 production normale
    cap: 1.0
    signe: 1
    poids: 5
    # [BOOST NEWS 24h — refonte 23/06] pertinence 24h 0.7 → 1.0 (porteur synthèse
    # news net IA cuivre, tie-break poids max) : une grosse news minière fraîche
    # doit pouvoir dominer la conviction 24h. 7j/1m INCHANGÉS.
    pertinence: { "24h": 1.0, "7j": 0.9, "1m": 0.5 }
    effet_long: "Grève active/annonce 30j"
    effet_short: "Production normale"

  - id: 4
    nom: "Tendance du dollar (20 jours)"
    source: "Twelve Data"
    cle_courante: "dxy_trend_20j"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : DXY baisse => LONG
    poids: 6
    pertinence: { "24h": 0.3, "7j": 0.7, "1m": 0.8 }
    effet_long: "DXY baisse"
    effet_short: "DXY monte"

  - id: 5
    nom: "Positionnement des gros spéculateurs (cuivre)"
    source: "CFTC (vendredi)"
    cle_courante: "cftc_cot_copper_nets"
    normalisation: "zscore"
    zscore_window: 252
    zscore_div: 2
    cap: 1.0
    signe: -1                    # inversé : nets SHORT extreme => LONG (squeeze)
    poids: 5
    pertinence: { "24h": 0.2, "7j": 0.7, "1m": 1.0 }
    effet_long: "Nets SHORT extreme"
    effet_short: "Nets LONG extreme"

  - id: 6
    nom: "Structure des prix futurs cuivre (spot vs M+3)"
    source: "Twelve Data (contrats)"
    cle_courante: "term_structure_m1_m3"
    normalisation: "lineaire"
    centre: 0.0
    echelle: 75.0                # USD/T ; backwardation >50 / contango >100 → demi-span ~75 ; à calibrer
    cap: 1.0
    signe: 1
    poids: 5
    pertinence: { "24h": 0.2, "7j": 0.9, "1m": 0.7 }
    effet_long: "Backwardation >50 USD/T"
    effet_short: "Contango >100 USD/T"

  - id: 7
    nom: "Plans de construction et infrastructures US-Chine"
    source: "events-log"
    cle_courante: "news_construction_infra"
    normalisation: "triplet"     # +1 stimulus/plan infra 30j / 0 / -1 annulation/réduction
    cap: 1.0
    signe: 1
    poids: 4
    pertinence: { "24h": 0.2, "7j": 0.5, "1m": 0.9 }
    effet_long: "Stimulus/plan infra 30j"
    effet_short: "Annulation/réduction"

  - id: 8
    nom: "Ratio cuivre / or (appétit pour le risque)"
    source: "Twelve Data (calculé)"
    cle_courante: "ratio_cuivre_or"
    normalisation: "zscore"
    zscore_window: 60
    zscore_div: 2
    cap: 1.0
    signe: 1
    poids: 3
    pertinence: { "24h": 0.4, "7j": 0.7, "1m": 0.6 }
    effet_long: "Hausse (z>+1, growth)"
    effet_short: "Baisse (z<-1, safe haven)"

  # Critère tendance-prix v3 — correctif famille trend-following (audit 10/06,
  # momentum-prix-sweep §5.4). cle=momentum_prix_20j_cuivre, source=yfinance via HG=F
  # (Twelve ne sert PAS ce future au bon niveau : XCU/USD=404, ETF au mauvais niveau
  # écartés — zéro invention ; HG=F reste l'identifiant interne ticker_principal),
  # poids initial 8 ramené à 6 (A3 prove-first, concertation 10/06), motif : la fiche n'avait aucun critère de tendance-prix propre →
  # incohérent avec la thèse trend-following. Signe +1 = on SUIT la tendance.
  # Calculé par la branche dédiée `momentum_prix_20j_` du dispatcher (A1,
  # 10/06) : VRAIE variation 20j puis z-score de la série de rendements. Pertinences = défaut
  # famille {24h:0.6, 7j:1.0, 1m:0.8} (brief 10/06).
  - id: 11
    nom: "Tendance du cuivre (20 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_20j_cuivre"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.4, "7j": 0.3, "1m": 1.0 }   # 22/06 recalibrage : 20j sert le 1 mois (retard ~10j), minoritaire sur 7j
    effet_long: "Cuivre en tendance haussière (z>+1)"
    effet_short: "Cuivre en tendance baissière (z<-1)"

  - id: 12
    nom: "Tendance du cuivre (7 jours)"
    source: "yfinance (Twelve ne sert pas ce future)"
    cle_courante: "momentum_prix_7j_cuivre"
    normalisation: "zscore"
    zscore_window: 60            # profondeur de distribution (cohérent sox_trend_5j/dxy_trend_20j) ; "20j" du nom = horizon de tendance conceptuel
    zscore_div: 2
    cap: 1.0
    signe: 1                     # +1 : rendement 20j au-dessus de sa distribution récente (z>+1) = tendance haussière suivie => LONG
    poids: 6                     # 8→6 : prove-first concertation 10/06, promotion 6→supérieur seulement sur preuve (métrique FAUSSES-aux-retournements). Cf. CHANGELOG 11/06 (A3).
    pertinence: { "24h": 0.3, "7j": 1.0, "1m": 0.2 }   # 22/06 recalibrage : tendance COURTE, domine le 7j (retard ~2-3j)
    effet_long: "Cuivre en tendance haussière (z>+1)"
    effet_short: "Cuivre en tendance baissière (z<-1)"


  # GATE — drapeau hors score (voir SCHEMA-fiche.md § GATE). Pas de poids numérique.
  - id: 9
    nom: "Drapeau : événement de marché majeur imminent"
    source: "events-log + calendrier"
    cle_courante: "gate_regime_extreme"
    normalisation: "gate"
    pertinence: { "24h": 1.0, "7j": 1.0, "1m": 1.0 }
    effet_short: "Caixin PMI <24h OU FOMC <24h OU stimulus Chine annoncé 48h"
